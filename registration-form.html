<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="registration-styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap" rel="stylesheet">
</head>
<body>
  <header class="header-wrap">
    <a class="header-logo">
      <img src="/images/header-logo.png" alt="logo_linked_in">
    </a>
  </header>
  <section class="user-card">
    <h1>Увійти</h1>
    <p class="stay-in-actual-actions">Залишайтеся в курсі подій у вашому професійному світі.</p>
    <form action="" class="form">
      <input type="email" id="email" placeholder="Адреса е-пошти чи телефон"><br>
      <input type="password" id="password" placeholder="Пароль">
    </form>
    <a href="#" class="forget-password">Забули пароль?</a>
    <div class="autorised">
      <input type="checkbox" name="checkbox" id="saved-in-system">
      <p>
        Залишити мене авторизованим на платформі
      </p>
    </div>
    <a href="#" class="come-in">
      <button type="submit">
        Увійти
      </button>
    </a>
    <p class="continue-policy">
      Натискаючи «Продовжити», ви приймаєте
      <a class="use" href="#">
        Угоду про користування LinkedIn,
      </a>
      <a class="policy" href="#">
        Політику кондфіденційності
      </a>
      та
      <a class="cookie" href="#">
        Політику щодо файлів cookie
      </a>
      .
    </p>
    <a href="#" class="google">
      <button>
        <img src="/images/google-logo.png" alt="">
        Continue with Google
      </button>
    </a>
    <a href="#" class="apple">
      <button>
        <img src="/images/apple-logo.png" alt="">
        Увійти з Apple
      </button>
    </a>
  </section>
</body>
</html>
